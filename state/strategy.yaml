version: "01"
strategy_name: "1-Minute Scalping with 15-Minute Liquidity Sweeps"

# --- tunable parameters (Hermes changes ONE per reflection cycle) ---
entry:
  swing_lookback: 2        # n-bar pivot for swing high/low detection
  min_wick_ratio: 0.30     # wick must be >= this fraction of total bar range
  valid_window_bars: 2     # how many 15m candles a setup stays active
  sl_multiplier: 0.50      # stop = entry_extreme + (trigger_distance * multiplier)
